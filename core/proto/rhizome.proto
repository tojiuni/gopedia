syntax = "proto3";

package gopedia.rhizome.v1;

option go_package = "gopedia/core/proto/gen/go;pb";

// RhizomeMessage is the canonical payload for ingestion into Rhizome.
// All records from one document share the same machine_id.
message RhizomeMessage {
  int64 id = 1;                    // optional message/record id
  string title = 2;                // document title
  string content = 3;              // full markdown content
  string toc = 4;                  // TOC as JSON (tree of heading text, level, children)
  map<string, string> source_metadata = 5;  // front-matter: author, date, tags, etc.
  int64 machine_id = 6;            // 64-bit identity from identity-so; same for all records of one document
}

// IngestRequest is sent from Root (e.g. Markdown Connector) to Phloem.
message IngestRequest {
  string title = 1;
  string content = 2;
  map<string, string> source_metadata = 3;
  string domain = 4;  // pipeline selector: "wiki" (default), "code", "pdf", etc.
}

// IngestResponse returned by Phloem after persisting to Rhizome.
message IngestResponse {
  int64 machine_id = 1;
  string doc_id = 2;               // document id used in PostgreSQL/TypeDB/Qdrant
  bool ok = 3;
  string error_message = 4;
}

// RegisterProjectRequest upserts a project row by root_path (filesystem scope for ingestion).
message RegisterProjectRequest {
  string name = 1;
  string root_path = 2;
  map<string, string> metadata = 3;
  // If zero, Phloem derives a stable machine_id from root_path. If set, that value is stored on first insert.
  int64 machine_id = 4;
}

message RegisterProjectResponse {
  int64 project_id = 1;
  int64 machine_id = 2;
  // True when the project's content_hash matches the stored hash — client may skip ingestion.
  bool already_up_to_date = 3;
}

// FinalizeProjectRequest is sent after all files in a project are ingested.
// The server recomputes the Merkle hash from L1 records and stores it in projects.content_hash.
message FinalizeProjectRequest {
  int64 project_id = 1;
}

message FinalizeProjectResponse {
  bool ok = 1;
}

// Phloem service: ingests markdown (and later other formats) into Rhizome.
service Phloem {
  rpc IngestMarkdown(IngestRequest) returns (IngestResponse);
  rpc RegisterProject(RegisterProjectRequest) returns (RegisterProjectResponse);
  rpc FinalizeProject(FinalizeProjectRequest) returns (FinalizeProjectResponse);
}
