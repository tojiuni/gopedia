syntax = "proto3";

package gopedia.rhizome.v1;

option go_package = "gopedia/core/proto/gen/go;pb";

// RhizomeMessage is the canonical payload for ingestion into Rhizome.
// All records from one document share the same machine_id.
message RhizomeMessage {
  int64 id = 1;                    // optional message/record id
  string title = 2;                // document title
  string content = 3;              // full markdown content
  string toc = 4;                  // TOC as JSON (tree of heading text, level, children)
  map<string, string> source_metadata = 5;  // front-matter: author, date, tags, etc.
  int64 machine_id = 6;            // 64-bit identity from identity-so; same for all records of one document
}

// IngestRequest is sent from Root (e.g. Markdown Connector) to Phloem.
message IngestRequest {
  string title = 1;
  string content = 2;
  map<string, string> source_metadata = 3;
}

// IngestResponse returned by Phloem after persisting to Rhizome.
message IngestResponse {
  int64 machine_id = 1;
  string doc_id = 2;               // document id used in PostgreSQL/TypeDB/Qdrant
  bool ok = 3;
  string error_message = 4;
}

// Phloem service: ingests markdown (and later other formats) into Rhizome.
service Phloem {
  rpc IngestMarkdown(IngestRequest) returns (IngestResponse);
}
