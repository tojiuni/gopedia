# .woodpecker/ci.yml
# gopedia-svc 이미지 빌드 & push (Dagger) + K8s 배포
#
# Woodpecker Secrets 필요:
#   REGISTRY_TOKEN   — artifacts.toji.homes woodpecker-ci 유저 API 토큰
#   KUBECONFIG_DATA  — base64 인코딩된 kubeconfig
#                      (kubectl config view --raw | base64)

when:
  - event: push
    branch: main
  - event: pull_request
  - event: manual

steps:
  # ── PR: 빌드 검증만 (push 없음) ─────────────────────────────────────────
  - name: validate-pr
    image: python:3.12-slim
    environment:
      DAGGER_RUNNER_HOST: tcp://dagger-engine.dagger.svc.cluster.local:1234
    commands:
      - pip install -q dagger-io anyio
      - python ci/run.py validate
    when:
      - event: pull_request

  # ── main push / manual: 빌드 + registry push ────────────────────────────
  - name: build-push
    image: python:3.12-slim
    environment:
      REGISTRY_TOKEN:
        from_secret: REGISTRY_TOKEN
      DAGGER_RUNNER_HOST: tcp://dagger-engine.dagger.svc.cluster.local:1234
    commands:
      - echo "DAGGER_RUNNER_HOST=${DAGGER_RUNNER_HOST}"
      - pip install -q dagger-io anyio
      - python ci/run.py build --sha=${CI_COMMIT_SHA}
    when:
      - event: push
        branch: main
      - event: manual

  # ── main push / manual: K8s 배포 ────────────────────────────────────────
  - name: deploy
    image: bitnami/kubectl:latest
    environment:
      KUBECONFIG_DATA:
        from_secret: KUBECONFIG_DATA
    commands:
      - |
        mkdir -p /root/.kube
        echo "${KUBECONFIG_DATA}" | base64 -d > /root/.kube/config
        chmod 600 /root/.kube/config

        # 매니페스트 적용 (namespace, serviceaccount, deployment, service)
        kubectl apply -f deploy/k8s/gopedia-svc.yaml

        # 새 이미지로 업데이트 (SHA 태그 고정)
        TAG="${CI_COMMIT_SHA:0:7}"
        kubectl set image deployment/gopedia-svc \
          gopedia-svc=artifacts.toji.homes/neunexus/gopedia-svc:${TAG} \
          -n gopedia-svc

        # 롤아웃 완료 대기
        kubectl rollout status deployment/gopedia-svc -n gopedia-svc --timeout=120s
    when:
      - event: push
        branch: main
      - event: manual
