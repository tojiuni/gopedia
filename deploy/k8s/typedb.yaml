apiVersion: v1
kind: Namespace
metadata:
  name: taxon
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: typedb
  namespace: taxon
---
# Headless Service — StatefulSet Pod identity DNS 전용
# typedb-0.typedb-headless.taxon.svc.cluster.local 형태로 Pod 직접 접근 가능
# 클라이언트 접속에는 사용하지 않음
apiVersion: v1
kind: Service
metadata:
  name: typedb-headless
  namespace: taxon
spec:
  selector:
    app: typedb
  clusterIP: None
  ports:
    - name: typedb
      port: 1729
      targetPort: 1729
    - name: console
      port: 8000
      targetPort: 8000
---
# ClusterIP Service — 클라이언트 접속용 (TYPEDB_HOST 값)
# gopedia-svc: TYPEDB_HOST = "typedb.taxon.svc"
apiVersion: v1
kind: Service
metadata:
  name: typedb
  namespace: taxon
spec:
  selector:
    app: typedb
  ports:
    - name: typedb
      port: 1729
      targetPort: 1729
    - name: console
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: typedb
  namespace: taxon
  labels:
    app: typedb
spec:
  serviceName: typedb-headless
  replicas: 1
  selector:
    matchLabels:
      app: typedb
  template:
    metadata:
      labels:
        app: typedb
    spec:
      serviceAccountName: typedb
      containers:
        - name: typedb
          image: typedb/typedb:3.8.2
          ports:
            - name: typedb
              containerPort: 1729
            - name: console
              containerPort: 8000
          env:
            - name: TYPEDB_DATA
              value: /var/lib/typedb/data
          livenessProbe:
            tcpSocket:
              port: 1729
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 1729
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: typedb-data
              mountPath: /var/lib/typedb/data
  volumeClaimTemplates:
    - metadata:
        name: typedb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: cinder-standard
        resources:
          requests:
            storage: 20Gi
