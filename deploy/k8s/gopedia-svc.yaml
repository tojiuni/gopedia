apiVersion: v1
kind: Namespace
metadata:
  name: gopedia-svc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gopedia-svc
  namespace: gopedia-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gopedia-svc
  namespace: gopedia-svc
  labels:
    app: gopedia-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gopedia-svc
  template:
    metadata:
      labels:
        app: gopedia-svc
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "gopedia-svc"
        # Postgres password → /vault/secrets/postgres
        vault.hashicorp.com/agent-inject-secret-postgres: "secret/data/neunexus/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/data/neunexus/postgres" -}}
          export POSTGRES_PASSWORD="{{ index .Data.data "password-gopedia" }}"
          {{- end }}
        # Qdrant API key → /vault/secrets/qdrant
        vault.hashicorp.com/agent-inject-secret-qdrant: "secret/data/neunexus/qdrant"
        vault.hashicorp.com/agent-inject-template-qdrant: |
          {{- with secret "secret/data/neunexus/qdrant" -}}
          export QDRANT_API_KEY="{{ index .Data.data "api-key" }}"
          {{- end }}
        # OpenAI placeholder key → /vault/secrets/openai
        # 실제 사용 시 secret/neunexus/gopedia-svc 의 openai-api-key 값을 교체하세요.
        vault.hashicorp.com/agent-inject-secret-openai: "secret/data/neunexus/gopedia-svc"
        vault.hashicorp.com/agent-inject-template-openai: |
          {{- with secret "secret/data/neunexus/gopedia-svc" -}}
          export OPENAI_API_KEY="{{ index .Data.data "openai-api-key" }}"
          {{- end }}
    spec:
      serviceAccountName: gopedia-svc
      containers:
        - name: gopedia-svc
          image: artifacts.toji.homes/neunexus/gopedia-svc:latest
          imagePullPolicy: Always
          # shell wrapper: Vault 시크릿 파일을 source한 뒤 Go 바이너리를 exec
          # (Go 바이너리는 /vault/secrets/env를 직접 읽지 않으므로 환경변수로 주입)
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -a
              for f in /vault/secrets/postgres /vault/secrets/qdrant /vault/secrets/openai; do
                [ -f "$f" ] && . "$f"
              done
              set +a
              exec /usr/local/bin/api
          ports:
            - name: http
              containerPort: 18787
            - name: grpc-phloem
              containerPort: 50051
          env:
            # ── Server ──────────────────────────────────────────────────────
            - name: GOPEDIA_HTTP_ADDR
              value: "0.0.0.0:18787"
            - name: GOPEDIA_PHLOEM_GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: GOPEDIA_LOG_LEVEL
              value: "info"
            - name: GOPEDIA_REPO_ROOT
              value: "/app"
            # ── PostgreSQL ───────────────────────────────────────────────────
            - name: POSTGRES_HOST
              value: "postgres-rw.taxon.svc"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "gopedia"
            - name: POSTGRES_DB
              value: "gopedia"
            - name: POSTGRES_SSLMODE
              value: "disable"
            # ── Qdrant ───────────────────────────────────────────────────────
            - name: QDRANT_HOST
              value: "qdrant.taxon.svc"
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_GRPC_PORT
              value: "6334"
            - name: QDRANT_COLLECTION
              value: "gopedia_markdown"
            - name: QDRANT_VECTOR_NAME
              value: ""
            # OPENAI_API_KEY는 Vault에서 주입됨 (placeholder 값)
            # OPENAI_BASE_URL, OPENAI_EMBEDDING_MODEL, LLM_CHAIN 등은
            # llm-config ConfigMap에서 주입 (아래 envFrom 참조)
            # ── LLM Answer Agent ─────────────────────────────────────────────
            - name: OLLAMA_CHAT_URL
              value: "http://ollama-generate.ai-assistant.svc:11434"
            - name: OLLAMA_CHAT_MODEL
              value: "gemma4:26b"
            # ── Reranker (선택) ──────────────────────────────────────────────
            # Cross-Encoder reranker 활성화. IMP-12(상주 서비스) 적용 전에는
            # 요청당 모델 로딩 오버헤드(~400MB)가 발생하므로 기본 비활성.
            # - name: GOPEDIA_RERANKER_ENABLED
            #   value: "true"
            # ── TypeDB (선택) ─────────────────────────────────────────────────
            # TypeDB가 클러스터에 없으면 아래 주석을 유지하세요.
            # TYPEDB_HOST 미설정 시 서버가 경고 없이 정상 기동됩니다.
            # - name: TYPEDB_HOST
            #   value: "typedb.taxon.svc"
            # - name: TYPEDB_PORT
            #   value: "1729"
            # - name: TYPEDB_DATABASE
            #   value: "gopedia"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 18787
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 18787
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: llm-config
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Uncomment to enable batch ingestion from filesystem documents:
          # volumeMounts:
          #   - name: morphogen
          #     mountPath: /morphogen
          #     readOnly: true
      # volumes:
      #   - name: morphogen
      #     persistentVolumeClaim:
      #       claimName: gopedia-morphogen
---
apiVersion: v1
kind: Service
metadata:
  name: gopedia-svc
  namespace: gopedia-svc
spec:
  selector:
    app: gopedia-svc
  ports:
    - name: http
      port: 18787
      targetPort: 18787
    - name: grpc-phloem
      port: 50051
      targetPort: 50051
---
